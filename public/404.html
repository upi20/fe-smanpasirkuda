<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>SMAN 1 Pasirkuda</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Encodes the current path and redirects to index.html with it as a query param.
      // segmentsToKeep = 1 for project pages (repo name is 1 path segment).
      // Use 0 for user/organisation pages (root domain, e.g. username.github.io).
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
